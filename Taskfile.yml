version: '3'

tasks:
  default:
    desc: Roda o ambiente de desenvolvimento completo
    cmds:
      - task: dev

  env:
    desc: Prepara o arquivo .env
    status:
      - test -f .env
    cmds:
      - cp .env.example .env
      - echo "" >> .env
      - echo "# Banco de Dados Local" >> .env
      - echo 'DATABASE_URL="postgresql://postgres:password@localhost:5432/agent1_db?schema=public"' >> .env

  deps:
    desc: Instala as dependências Node.js
    cmds:
      - npm install

  infra:
    desc: Sobe os containers Docker em background
    cmds:
      - docker compose up -d

  db:
    desc: Gera os clients do Prisma e aplica o schema no banco local
    deps: [env, infra, deps]
    cmds:
      - npx prisma generate
      - npx prisma db push
      - npx prisma db seed
      - task: import-workflow

  import-workflow:
    desc: Importa e ativa o workflow padrão no n8n, depois reinicia para registrar os webhooks
    cmds:
      - |
        node -e "console.log('Aguardando inicializacao do n8n para importar o fluxo...'); const check = () => fetch('http://localhost:5678/healthz').then(r => r.status === 200 ? setTimeout(() => { console.log('n8n pronto! Aguardando 15s para garantir que as migracoes terminaram...'); setTimeout(() => process.exit(0), 15000); }, 1000) : setTimeout(check, 2000)).catch(() => setTimeout(check, 2000)); check();"
      - docker compose exec -T n8n n8n import:workflow --input /etc/n8n/agent-workflow.json
      - docker compose exec -T n8n n8n publish:workflow --id=1
      - docker compose restart n8n

  test:
    desc: Executa a suíte completa de testes (integração e E2E) garantindo que a infraestrutura esteja pronta e saudável
    deps: [db]
    cmds:
      - |
        node -e "console.log('Aguardando n8n estar pronto para os testes...'); const check = () => fetch('http://localhost:5678/healthz').then(r => r.status === 200 ? setTimeout(() => { console.log('n8n pronto! Aguardando 5s para registro dos webhooks...'); setTimeout(() => process.exit(0), 5000); }, 1000) : setTimeout(check, 2000)).catch(() => setTimeout(check, 2000)); check();"
      - npm run test:integration
      - npm run test:e2e

  dev:
    desc: Inicia o servidor local do Next.js
    deps: [db]
    cmds:
      - npm run dev

  stop:
    desc: Para os containers da infraestrutura local sem remover dados
    cmds:
      - docker compose stop

  down:
    desc: Para e remove os containers e redes locais da infraestrutura
    cmds:
      - docker compose down

  clean:
    desc: Remove os containers, volumes (deleta banco de dados) e pasta de build do Next.js
    cmds:
      - docker compose down -v
      - node -e "const fs = require('fs'); if (fs.existsSync('.next')) fs.rmSync('.next', {recursive:true,force:true});"

  reset:
    desc: Limpa completamente a infraestrutura e reconstrói o ambiente local do zero
    cmds:
      - task: clean
      - task: dev
