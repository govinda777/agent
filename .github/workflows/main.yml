name: CI Quality Assurance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Format Check (Prettier)
        run: npx prettier --check "src/**/*.{ts,tsx,js,json}"

      - name: Lint Check (ESLint)
        run: npm run lint

      - name: TypeScript Compile Check
        run: npx tsc --noEmit

      - name: Run Unit Tests
        run: npm run test:unit
